# Alembic configuration — values shared across every migration invocation.
# Per-invocation connection URL is resolved programmatically in env.py so
# it picks up the app's runtime settings (env / .env).

[alembic]
script_location = %(here)s
sqlalchemy.url = driver://placeholder:placeholder@placeholder/placeholder

file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# Detect schema changes precisely
compare_type = true
compare_server_default = true

[post_write_hooks]
hooks = ruff, ruff-format
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME
ruff-format.type = console_scripts
ruff-format.entrypoint = ruff
ruff-format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%dT%H:%M:%S
