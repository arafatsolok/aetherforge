<div class="grid grid-cols-2 md:grid-cols-5 gap-4">
  <div class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
    <div class="text-xs text-slate-400 uppercase tracking-wider">Targets</div>
    <div class="mt-1 text-2xl font-semibold">{{ counts.targets }}</div>
  </div>
  <div class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
    <div class="text-xs text-slate-400 uppercase tracking-wider">Scans</div>
    <div class="mt-1 text-2xl font-semibold">{{ counts.scans }}</div>
  </div>
  <div class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
    <div class="text-xs text-slate-400 uppercase tracking-wider">Findings</div>
    <div class="mt-1 text-2xl font-semibold">{{ counts.findings }}</div>
  </div>
  <div class="rounded-xl border border-rose-800/40 bg-rose-950/30 p-4">
    <div class="text-xs text-rose-300 uppercase tracking-wider">Open H/Crit</div>
    <div class="mt-1 text-2xl font-semibold text-rose-300">{{ open_critical }}</div>
  </div>
  <div class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
    <div class="text-xs text-slate-400 uppercase tracking-wider">Personas</div>
    <div class="mt-1 text-sm space-x-2">
      {% for p, n in (scan_personas or {}).items() %}
        <span class="pill pill--running">{{ p }} · {{ n }}</span>
      {% else %}
        <span class="text-slate-500 text-xs">no scans yet</span>
      {% endfor %}
    </div>
  </div>
</div>
