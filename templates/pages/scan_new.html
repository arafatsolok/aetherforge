{% extends "base.html" %}
{% block title %}AetherForge — New scan{% endblock %}

{% block content %}
<section class="max-w-xl mx-auto space-y-6">
  <div>
    <a href="/ui/scans" class="text-emerald-400 hover:underline text-sm">← scans</a>
    <h1 class="text-2xl font-semibold mt-1">Start new scan</h1>
    <p class="text-slate-400 text-sm mt-1">
      The orchestrator picks the first rule whose <code>when</code> matches and
      begins the autonomous loop.
    </p>
  </div>

  {% if error %}
  <div class="rounded-lg border border-rose-700 bg-rose-950/40 px-4 py-3 text-sm text-rose-200">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/ui/scans/new"
        class="rounded-xl border border-slate-800 bg-slate-900/40 p-6 space-y-4">
    <input type="hidden" name="_csrf" value="{{ csrf_token(request) }}" />
    <label class="block">
      <span class="text-xs text-slate-400 uppercase">Target</span>
      <select name="target_slug" required
              class="mt-1 w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm">
        {% for t in targets %}
          <option value="{{ t.slug }}">
            {{ t.slug }}
            {% if t.replica_only %} (replica){% endif %}
            — {{ t.allowed_personas | join(',') }}
          </option>
        {% else %}
          <option disabled>No active targets — create one first</option>
        {% endfor %}
      </select>
    </label>

    <label class="block">
      <span class="text-xs text-slate-400 uppercase">Persona</span>
      <select name="persona" required
              class="mt-1 w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm">
        {% for p in personas %}
          <option value="{{ p }}" {% if p == 'gray' %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
      <span class="text-xs text-slate-500 mt-1 block">
        Black persona requires <code>replica_only=true</code> on the target.
      </span>
    </label>

    <label class="block">
      <span class="text-xs text-slate-400 uppercase">Started by</span>
      <input name="started_by" type="text" value="ui" maxlength="128"
             class="mt-1 w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm" />
    </label>

    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="px-4 py-2 bg-emerald-600/80 hover:bg-emerald-500 text-white rounded text-sm">
        Launch scan
      </button>
      <a href="/ui/scans" class="text-sm text-slate-400 hover:text-slate-200">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
