id: r.enum.ffuf.dirs
version: 2
description: >
  Content discovery with ffuf against HTTP endpoints returning 200 or 403.
  Emits web_endpoint facts for each hit so exploitation rules can target them.
phase: enumeration
priority: 55
persona: [gray, black]
tags: [enumeration, ffuf, web]

when:
  all:
    - fact_type: http_response
      where:
        status_code:
          in: [200, 403]
    - not_fact:
        fact_type: web_endpoint
        where: { host: "$fact.host" }

then:
  action: execute_tool
  tool: ffuf
  params:
    target: "$fact.url/FUZZ"
    # `-o /tmp/ffuf.json` instead of /output/ffuf.json — the sandbox's
    # rootfs is read-only with only /tmp mounted as tmpfs. The stdout
    # capture also carries the JSONL so the parser doesn't actually
    # need to read the file back from the container.
    flags:
      - "-w"
      - "/wordlists/common.txt"
      - "-mc"
      - "200,301,302,307,401,403"
      - "-o"
      - "/tmp/ffuf.json"
      - "-of"
      - "json"
      - "-rate"
      - "60"
  on_success:
    - emit_fact: web_endpoint
