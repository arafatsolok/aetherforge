id: r.recon.dns.a_record
version: 2
description: >
  Resolve A records for every discovered subdomain. Cheap, runs for every
  persona.
phase: recon.passive
priority: 85
persona: [white, gray, black]
tags: [recon, passive, dns]

when:
  all:
    - fact_type: subdomain
    - not_fact:
        fact_type: dns_record
        where:
          host: "$fact.host"
          type: "A"

then:
  action: execute_tool
  tool: httpx
  params:
    target: "$fact.host"
    # httpx doesn't have a -dns flag; `-ip` already returns the A records.
    # Add `-tech-detect` + `-title` so the same probe fills ``service_banner``
    # and ``http_response`` facts that downstream rules (vuln detection)
    # expect.
    flags: ["-silent", "-json", "-ip", "-tech-detect", "-title", "-follow-redirects"]
  on_success:
    - emit_fact: dns_record
